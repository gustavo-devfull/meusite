<!DOCTYPE html>
<html class="scroll-smooth" lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Gustavo Santos | Front-End Developer</title>
  <meta name="description" content="Portfólio de Gustavo Santos, desenvolvedor Front-End apaixonado por design e tecnologia. Projetos em React, Vue.js, TypeScript e mais." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Material Symbols: subset com apenas os 7 ícones usados -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_forward,close,mail,menu,menu_book,rocket_launch,school&display=block" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_forward,close,mail,menu,menu_book,rocket_launch,school&display=block" /></noscript>
</head>
